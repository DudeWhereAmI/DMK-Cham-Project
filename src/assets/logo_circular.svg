<svg viewBox="0 0 400 400" width="400" height="400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background cream wash -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDFBF9" />
      <stop offset="100%" stop-color="#FAF4F0" />
    </radialGradient>

    <!-- Celestial Moon gradient -->
    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4C2C2" />
      <stop offset="50%" stop-color="#E28C9A" />
      <stop offset="100%" stop-color="#D47A8B" />
    </linearGradient>

    <!-- Ornate Mirror rose gold gradient -->
    <linearGradient id="roseGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF0EB" />
      <stop offset="40%" stop-color="#E28C9A" />
      <stop offset="70%" stop-color="#EADAB7" />
      <stop offset="100%" stop-color="#C57E8B" />
    </linearGradient>

    <!-- Glass reflections -->
    <linearGradient id="glassReflection" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5F3FD" />
      <stop offset="60%" stop-color="#AAD3EF" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#CBE5FF" stop-opacity="0.1" />
    </linearGradient>

    <!-- Drop shadows -->
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#8c6a60" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Ivory Background -->
  <!-- <rect width="400" height="400" fill="url(#bgGrad)" rx="24" /> -->

  <!-- Celestial Dot Configurations & Orbit Rings -->
  <!-- Orbital pathways -->
  <circle cx="200" cy="180" r="140" stroke="#E28C9A" stroke-width="0.8" stroke-dasharray="3 4" opacity="0.4" />
  <circle cx="200" cy="180" r="115" stroke="#EADAB7" stroke-width="0.6" stroke-dasharray="5 3" opacity="0.3" />

  <!-- Orbit Planet Nodes (Teal, Gold, Cream, Blue) -->
  <circle cx="95" cy="115" r="5" fill="#68B2A0" stroke="#FDFBF9" stroke-width="1.2" filter="url(#softShadow)" />
  <circle cx="56" cy="190" r="6" fill="#E28C9A" stroke="#FDFBF9" stroke-width="1.2" filter="url(#softShadow)" />
  <circle cx="99" cy="265" r="4" fill="#AAD3EF" stroke="#FDFBF9" stroke-width="1" />
  <circle cx="340" cy="115" r="6.5" fill="#EADAB7" stroke="#FDFBF9" stroke-width="1.2" filter="url(#softShadow)" />
  <circle cx="370" cy="190" r="4.5" fill="#FFF" stroke="#E28C9A" stroke-width="1" />

  <!-- The Beautiful Pink Celestial Crescent Moon -->
  <g filter="url(#softShadow)">
    <path d="M 210,65 C 135,65 75,115 75,185 C 75,255 135,305 210,305 C 160,305 118,260 118,185 C 118,110 160,65 210,65 Z" fill="url(#moonGrad)" />
  </g>

  <!-- Moon Star Map & Constellation Lines -->
  <g stroke="#FFF" stroke-width="0.6" opacity="0.55" fill="none">
    <line x1="125" y1="125" x2="142" y2="105" />
    <line x1="142" y1="105" x2="175" y2="100" />
    <line x1="125" y1="125" x2="110" y2="155" />
    <line x1="110" y1="155" x2="104" y2="190" />
    <line x1="104" y1="190" x2="114" y2="225" />
    <line x1="114" y1="225" x2="135" y2="255" />
    <line x1="135" y1="255" x2="165" y2="275" />
  </g>
  
  <!-- Constellation Tiny Star Pins -->
  <g fill="#FFF">
    <circle cx="125" cy="125" r="1.5" />
    <circle cx="142" cy="105" r="1.2" />
    <circle cx="175" cy="100" r="1.8" />
    <circle cx="110" cy="155" r="1.5" />
    <circle cx="104" cy="190" r="2" />
    <circle cx="114" cy="225" r="1.5" />
    <circle cx="135" cy="255" r="1.8" />
    <circle cx="165" cy="275" r="1.5" />
  </g>

  <!-- Ornate Mirror placement within Crescent Moon shadow -->
  <g filter="url(#softShadow)" transform="translate(160, 105)">
    <!-- Handle -->
    <path d="M 40,85 C 36,105 38,135 40,145 C 41,148 49,148 50,145 C 52,135 54,105 50,85 Z" fill="url(#roseGold)" />
    <circle cx="45" cy="143" r="2" fill="#EADAB7" />
    
    <!-- Outer Shield Frame -->
    <ellipse cx="45" cy="48" rx="27" ry="32" fill="url(#roseGold)" stroke="#FFF" stroke-width="0.8" />
    
    <!-- Elaborate carved decorative lace peaks -->
    <!-- Top crest crown -->
    <path d="M 45,10 C 42,4 48,4 45,10" stroke="url(#roseGold)" stroke-width="2.5" stroke-linecap="round" fill="none" />
    <path d="M 40,14 C 36,7 44,7 40,14" stroke="url(#roseGold)" stroke-width="1.8" stroke-linecap="round" fill="none" />
    <path d="M 50,14 C 54,7 46,7 50,14" stroke="url(#roseGold)" stroke-width="1.8" stroke-linecap="round" fill="none" />
    
    <circle cx="45" cy="3" r="2.2" fill="#EADAB7" />
    
    <!-- Side lace curves -->
    <path d="M 18,48 C 12,48 15,40 18,48 Q 12,54 18,60" stroke="url(#roseGold)" stroke-width="1.5" fill="none" />
    <path d="M 72,48 C 78,48 75,40 72,48 Q 78,54 72,60" stroke="url(#roseGold)" stroke-width="1.5" fill="none" />

    <!-- Mirror Inner reflective glass -->
    <ellipse cx="45" cy="48" rx="20" ry="25" fill="url(#glassReflection)" stroke="#FFF" stroke-width="0.8" />
    
    <!-- Star glint in mirror -->
    <path d="M 45,35 Q 45,43 51,43 Q 45,43 45,51 Q 45,43 39,43 Q 45,43 45,35 Z" fill="#FFF" opacity="0.85" />
    <path d="M 45,40 Q 45,43 48,43 Q 45,43 45,46 Q 45,43 42,43 Q 45,43 45,40 Z" fill="#EADAB7" />
  </g>

  <!-- Ornate Hair Claw Clip nested on the right of mirror -->
  <g filter="url(#softShadow)" transform="translate(182, 185)">
    <!-- Claw Base -->
    <!-- Rounded main shell with custom elements -->
    <path d="M 18,29 C 14,21 21,12 42,12 C 44,12 50,12 52,12 C 73,12 82,21 78,29 C 75,37 69,42 58,43 C 52,43.5 48,42 43,42 C 38,42 32,43.5 27,43 C 16,42 11,37 18,29 Z" fill="url(#roseGold)" />
    
    <path d="M 21,26 C 18,19 24,14 42,14 C 44,14 50,14 52,14 C 70,14 76,19 73,26" fill="none" stroke="#FFF" stroke-width="1.2" opacity="0.6" />

    <!-- Hinge -->
    <path d="M 42,10 L 52,10 M 43,6 L 43,14 M 51,6 L 51,14" stroke="#EADAB7" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <circle cx="47" cy="10" r="3" fill="none" stroke="#D3C29E" stroke-width="1.5"/>

    <!-- Interlocking claws teeth -->
    <g stroke="url(#roseGold)" stroke-width="1.8" fill="none" opacity="0.82">
      <path d="M 22,35 Q 20,49 21,52 M 34,37 Q 32,51 33,54 M 46,38 Q 44,52 45,55" />
      <path d="M 28,36 Q 29,50 27,53 M 40,37 Q 41,51 39,54 M 52,37 Q 53,51 51,54 M 64,35 Q 65,49 63,52" />
      <path d="M 58,38 Q 57,52 58,55 M 70,35 Q 68,49 69,52" />
    </g>

    <!-- Star symbol engraved in clip -->
    <circle cx="47" cy="27" r="1.5" fill="#EADAB7" />
    <path d="M 47,21 Q 47,27 51,27 Q 47,27 47,33 Q 47,27 43,27 Q 47,27 47,21 Z" fill="#FFF" opacity="0.9" />
  </g>

  <!-- Elegant Starburst Sparkles around moon -->
  <g fill="#EADAB7">
    <!-- North Star -->
    <path d="M 200,10 Q 200,28 208,28 Q 200,28 200,46 Q 200,28 192,28 Q 200,28 200,10 Z" />
    <!-- Small star top right -->
    <path d="M 238,95 Q 238,103 242,103 Q 238,103 238,111 Q 238,103 234,103 Q 238,103 238,95 Z" opacity="0.8" />
    <!-- Small star bottom right -->
    <path d="M 215,260 Q 215,268 219,268 Q 215,268 215,276 Q 215,268 211,268 Q 215,268 215,260 Z" opacity="0.8" />
    <!-- Large spark left -->
    <path d="M 125,300 Q 125,312 131,312 Q 125,312 125,324 Q 125,312 119,312 Q 125,312 125,300 Z" />
    <!-- Large spark right -->
    <path d="M 285,300 Q 285,312 291,312 Q 285,312 285,324 Q 285,312 279,312 Q 285,312 285,300 Z" />
    <circle cx="310" cy="330" r="3" fill="#E28C9A" />
    <circle cx="90" cy="330" r="3" fill="#E28C9A" />
  </g>

  <!-- Typography: CHẠM -->
  <g id="brand-typography" transform="translate(200, 312)">
    <text x="0" y="32" font-family="Georgia, serif" font-size="44" font-weight="900" letter-spacing="0.28em" text-anchor="middle" fill="#2D2423">CHA<tspan dx="-8">M</tspan></text>
    <!-- Dot under the letter A for Vietnamese tones (Ạ) -->
    <circle cx="28" cy="46" r="3.2" fill="#2D2423" />
    
    <!-- Colored elegant color washes under word "CHẠM" -->
    <!-- Note: creating subtle elegant letter overlays -->
    <text x="0" y="32" font-family="Georgia, serif" font-size="44" font-weight="900" letter-spacing="0.28em" text-anchor="middle" fill="url(#moonGrad)" opacity="0.22" style="mix-blend-mode: overlay;">CHA<tspan dx="-8">M</tspan></text>
  </g>

  <!-- Horizontal divider lines under logo -->
  <path d="M 140,375 L 180,375" stroke="#EADAB7" stroke-width="0.8" stroke-linecap="round" />
  <polygon points="200,372 203,375 200,378 197,375" fill="#EADAB7" />
  <path d="M 220,375 L 260,375" stroke="#EADAB7" stroke-width="0.8" stroke-linecap="round" />
</svg>
