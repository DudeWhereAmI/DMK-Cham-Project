<svg viewBox="0 0 720 180" width="720" height="180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="moonGradH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4C2C2" />
      <stop offset="50%" stop-color="#E28C9A" />
      <stop offset="100%" stop-color="#D47A8B" />
    </linearGradient>

    <linearGradient id="roseGoldH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF0EB" />
      <stop offset="40%" stop-color="#E28C9A" />
      <stop offset="70%" stop-color="#EADAB7" />
      <stop offset="100%" stop-color="#C57E8B" />
    </linearGradient>

    <linearGradient id="glassReflectionH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5F3FD" />
      <stop offset="60%" stop-color="#AAD3EF" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#CBE5FF" stop-opacity="0.1" />
    </linearGradient>

    <filter id="softShadowH" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#8c6a60" flood-opacity="0.12" />
    </filter>

    <!-- Fancy text gradient for CHẠM -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E28C9A" />
      <stop offset="35%" stop-color="#2D2423" />
      <stop offset="75%" stop-color="#805C72" />
      <stop offset="100%" stop-color="#5596A6" />
    </linearGradient>
  </defs>

  <!-- Group containing the visual emblem on the Left -->
  <g transform="translate(10, 0)">
    <!-- Orbit Rings -->
    <circle cx="100" cy="90" r="75" stroke="#E28C9A" stroke-width="0.7" stroke-dasharray="2 3" opacity="0.35" />
    <circle cx="100" cy="90" r="58" stroke="#EADAB7" stroke-width="0.5" stroke-dasharray="4 2" opacity="0.25" />

    <!-- Planet Nodes -->
    <circle cx="45" cy="55" r="3" fill="#68B2A0" stroke="#FFF" stroke-width="0.8" />
    <circle cx="25" cy="95" r="3.5" fill="#E28C9A" stroke="#FFF" stroke-width="0.8" />
    <circle cx="178" cy="95" r="4" fill="#EADAB7" stroke="#FFF" stroke-width="1" />
    <circle cx="45" cy="135" r="2.5" fill="#AAD3EF" />

    <!-- Pink Crescent Moon -->
    <path d="M 122,25 C 80,25 46,55 46,95 C 46,135 80,165 122,165 C 93,165 69,138 69,95 C 69,52 93,25 122,25 Z" fill="url(#moonGradH)" filter="url(#softShadowH)" />

    <!-- Constellation Stars -->
    <g fill="#FFF" opacity="0.6">
      <circle cx="73" cy="60" r="0.8" />
      <circle cx="83" cy="48" r="1" />
      <circle cx="64" cy="78" r="1.2" />
      <circle cx="61" cy="98" r="0.9" />
      <circle cx="66" cy="118" r="1.1" />
      <circle cx="78" cy="138" r="1" />
    </g>

    <!-- Detailed Hand Mirror -->
    <g transform="translate(90, 48)" filter="url(#softShadowH)" id="mirror-emb">
      <path d="M 22,50 C 19,62 20,80 22,86 C 23,88 28,88 29,86 C 30,80 31,62 29,50 Z" fill="url(#roseGoldH)" />
      <ellipse cx="25" cy="28" r="16" ry="19" fill="url(#roseGoldH)" stroke="#FFF" stroke-width="0.5" />
      <!-- Top crest crown -->
      <path d="M 25,6 Q 25,1 27,1 C 29,1 25,6 25,6 Z" fill="#EADAB7" />
      <circle cx="25" cy="1.5" r="1" fill="#EADAB7" />
      <!-- Glass -->
      <ellipse cx="25" cy="28" r="12" ry="15" fill="url(#glassReflectionH)" />
      <!-- Shine -->
      <path d="M 25,20 Q 25,25 28,25 Q 25,25 25,30 Q 25,25 22,25 Q 25,25 25,20 Z" fill="#FFF" opacity="0.8" />
    </g>

    <!-- Detailed Hair Claw Clip -->
    <g transform="translate(105, 95)" filter="url(#softShadowH)" id="clip-emb">
      <path d="M 12,18 C 9,13 13,7 26,7 H 32 C 45,7 50,13 48,18 C 46,23 42,26 36,27 C 32,27 29,26 26,26 C 23,26 20,27 17,27 C 10,26 7,23 12,18 Z" fill="url(#roseGoldH)" />
      <path d="M 14,16 Q 26,10 44,16" stroke="#FFF" stroke-width="0.8" fill="none" opacity="0.5" />
      <g stroke="url(#roseGoldH)" stroke-width="1.2" fill="none" opacity="0.8">
        <path d="M 15,22 Q 13,32 14,34 M 23,23 Q 21,33 22,35 M 31,23 Q 29,33 30,35" />
        <path d="M 19,23 Q 20,33 18,35 M 27,24 Q 28,34 26,36 M 35,23 Q 36,33 34,35" />
      </g>
    </g>

    <!-- Star sparkles -->
    <path d="M 115,15 Q 115,22 119,22 Q 115,22 115,29 Q 115,22 111,22 Q 115,22 115,15 Z" fill="#EADAB7" />
    <path d="M 160,115 Q 160,119 162,119 Q 160,119 160,123 Q 160,119 158,119 Q 160,119 160,115 Z" fill="#EADAB7" opacity="0.8" />
  </g>

  <!-- Typography Left aligned next to the Moon Visual -->
  <!-- Serif typeface with luxury layout -->
  <g id="brand-words" transform="translate(230, 0)">
    <!-- Elegant letters -->
    <text x="0" y="105" font-family="Georgia, serif" font-size="82" font-weight="550" letter-spacing="0.22em" fill="url(#textGrad)">C H A M</text>
    
    <!-- Subtle diamond sparkle within the 'Ạ' letter placement -->
    <path d="M 336,65 Q 336,75 342,75 Q 336,75 336,85 Q 336,75 330,75 Q 336,75 336,65 Z" fill="#E28C9A" />
    
    <!-- Underdot for Vietnamese tone Ạ -->
    <circle cx="337" cy="130" r="6.2" fill="#805C72" />

    <!-- Luxury Subtitle "ACCESSORY STUDIO" spaced out widely -->
    <text x="5" y="146" font-family="sans-serif" font-size="14.5" font-weight="900" letter-spacing="0.54em" fill="#E28C9A">ACCESSORY STUDIO</text>
  </g>
</svg>
