<svg viewBox="0 0 500 500" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft dropshadow for real standing product look -->
    <filter id="mirrorShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#554440" flood-opacity="0.18" />
    </filter>

    <!-- Ornate metal borders/carving gradient -->
    <linearGradient id="mirrorGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF7" />
      <stop offset="35%" stop-color="#F4C2C2" />
      <stop offset="65%" stop-color="#E28C9A" />
      <stop offset="100%" stop-color="#D1BFA5" />
    </linearGradient>

    <!-- Pearl handle texture -->
    <linearGradient id="pearlResin" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#F3E5EB" />
      <stop offset="100%" stop-color="#EEDAC5" />
    </linearGradient>

    <!-- Reflective high-contrast silver glass -->
    <linearGradient id="mirrorGlassReflection" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E9F7FF" />
      <stop offset="40%" stop-color="#BEE4FC" />
      <stop offset="70%" stop-color="#AAD3EF" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#E8F4FD" stop-opacity="0.2" />
    </linearGradient>
  </defs>

  <!-- Ground reflection shadow -->
  <g filter="url(#mirrorShadow)" transform="translate(25, 10)">
    <!-- 1. Elegant Victorian Handle -->
    <path 
      d="M 230,320 
         C 215,360 220,440 230,465 
         C 233,472 267,472 270,465 
         C 280,440 285,360 270,320 Z" 
      fill="url(#mirrorGold)" 
      stroke="#FFF" 
      stroke-width="1"
    />
    <!-- Inset pearlescent handle grip carving -->
    <path 
      d="M 238,335 
         C 228,370 232,430 238,450 
         C 240,453 260,453 262,450 
         C 268,430 272,370 262,335 Z" 
      fill="url(#pearlResin)" 
      stroke="#E28C9A" 
      stroke-width="0.8"
    />
    <!-- Tiny gold rivets on handle -->
    <circle cx="250" cy="360" r="2.5" fill="#EADAB7" />
    <circle cx="250" cy="400" r="2.5" fill="#EADAB7" />
    <circle cx="250" cy="440" r="2.5" fill="#EBDCA9" />
    <circle cx="250" cy="460" r="3" fill="#E28C9A" stroke="#FFF" stroke-width="0.5" />

    <!-- 2. Main Outer Large Mirror Frame -->
    <!-- Vintage ornate scalloped circle frame -->
    <ellipse cx="250" cy="180" rx="145" ry="170" fill="url(#mirrorGold)" stroke="#FFF" stroke-width="1.5" />

    <!-- 3. Elaborate Carved Filigree Ribs & Border Swirls -->
    <!-- Outer decorative floral crest at the top -->
    <g stroke="url(#mirrorGold)" stroke-width="3" fill="none" stroke-linecap="round">
      <!-- High-end Crown filigree -->
      <path d="M 250,5 C 230,-15 220,10 250,10" />
      <path d="M 250,5 C 270,-15 280,10 250,10" />
      
      <!-- Side crests -->
      <path d="M 215,10 C 185,-5 195,20 215,20" />
      <path d="M 285,10 C 315,-5 305,20 285,20" />
      
      <!-- Crown points beads -->
      <circle cx="250" cy="-6" r="4" fill="#EADAB7" stroke="#FFF" stroke-width="1" />
      <circle cx="210" cy="0" r="3" fill="#EADAB7" />
      <circle cx="290" cy="0" r="3" fill="#EADAB7" />
    </g>

    <!-- Side Baroque wing carvings -->
    <g stroke="url(#mirrorGold)" stroke-width="2.5" fill="none" stroke-linecap="round">
      <!-- Left Wing -->
      <path d="M 105,180 C 70,180 85,140 105,150 Q 80,165 95,195 Q 75,205 105,215" />
      <!-- Right Wing -->
      <path d="M 395,180 C 430,180 415,140 395,150 Q 420,165 405,195 Q 425,205 395,215" />
    </g>

    <!-- Bottom connection neck ring -->
    <ellipse cx="250" cy="326" rx="20" ry="10" fill="url(#mirrorGold)" stroke="#EADAB7" stroke-width="1.2" />

    <!-- 4. Inner Swirled Mother of Pearl Inset -->
    <ellipse cx="250" cy="180" rx="122" ry="145" fill="url(#pearlResin)" stroke="#E28C9A" stroke-width="1" />

    <!-- 5. Highly Reflective Silver Mirror Glass -->
    <ellipse cx="250" cy="180" rx="100" ry="122" fill="url(#mirrorGlassReflection)" stroke="#FFFFFF" stroke-width="1.8" />

    <!-- Multi-layered light glints and reflections on glass -->
    <g opacity="0.8">
      <!-- Starbeam reflection -->
      <path d="M 250,130 C 250,170 200,170 250,170 C 300,170 250,170 250,210 C 250,170 300,170 250,170 C 200,170 250,170 250,130 Z" fill="#FFFFFF" opacity="0.9" />
      <path d="M 250,145 Q 250,170 275,170 Q 250,170 250,195 Q 250,170 225,170 Q 250,170 250,145 Z" fill="#EADAB7" opacity="0.6" />
      <circle cx="250" cy="170" r="4.5" fill="#FFFFFF" />
      <!-- Small secondary starbeam -->
      <path d="M 190,120 Q 190,132 202,132 Q 190,132 190,144 Q 190,132 178,132 Q 190,132 190,120 Z" fill="#FFFFFF" opacity="0.75" />
      <circle cx="190" cy="132" r="1.5" fill="#FFFFFF" />
    </g>

    <!-- Curving elegant diagonal window shine glare on glass -->
    <path d="M 172,92 C 220,70 300,120 342,192 C 344,185 340,170 334,160 C 285,100 190,75 168,85 Z" fill="#FFFFFF" opacity="0.4" />
    <path d="M 152,142 C 180,130 220,160 248,212 C 250,205 245,190 238,180 C 210,135 170,125 148,135 Z" fill="#FFFFFF" opacity="0.3" />
  </g>
</svg>
